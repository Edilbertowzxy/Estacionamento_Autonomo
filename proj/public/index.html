<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Estacionamento UCL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Estacionamento UCL</h1>

<div class="cards">
  <div class="card">
    <span>Total</span>
    <h2>20</h2>
  </div>

  <div class="card green">
    <span>Livres</span>
    <h2 id="livres">0</h2>
  </div>

  <div class="card red">
    <span>Ocupadas</span>
    <h2 id="ocupadas">0</h2>
  </div>
</div>

<div class="container">

  <div class="map" id="map"></div>

  <div class="report">
    <h3>Monitoramento</h3>
    <div id="lista"></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
